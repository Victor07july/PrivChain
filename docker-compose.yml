

x-besu-def:
  &besu-def
  restart: "on-failure"
  image: hyperledger/besu:${BESU_VERSION:-latest}
  env_file:
    - ./config/besu/.env
  entrypoint:
    - /bin/bash
    - -c
    - |

      cp "/config/${BESU_CONS_ALGO:-QBFT}genesis.json" /config/genesis.json

      /opt/besu/bin/besu \
      --config-file=/config/configu.toml \
      --p2p-host=$$(hostname -i) \
      --rpc-http-api=WEB3,ETH,NET,TRACE,DEBUG,ADMIN,TXPOOL,PERM,${BESU_CONS_ALGO:-QBFT} \


x-ethsignerProxy-def:
  &ethsignerProxy-def
  restart: "on-failure"
  image: consensys/ethsigner:${ETHSIGNER_VERSION:-latest}
  command: [
    "--chain-id=1337",
    "--http-listen-host=0.0.0.0",
    "--downstream-http-port=8545",
    "--downstream-http-host=rpcnode-admin",
    "file-based-signer",
    "-k",
    "/opt/ethsigner/keyfile",
    "-p",
    "/opt/ethsigner/passwordfile"
  ]
  ports:
    - 8545

services:
  nginx:
    container_name: nginx
    restart: "on-failure"
    image: nginx:1.29.0-bookworm
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - 80:80
      - 443:443
    networks:
      besu-network:
        ipv4_address: 172.16.239.20
    depends_on:
      auth-service:
        condition: service_healthy

  auth-db:
    extends:
      file: ./auth/docker-compose.yml
      service: auth-db
    networks:
      besu-network:
        ipv4_address: 172.16.239.21

  auth-service:
    extends:
      file: ./auth/docker-compose.yml
      service: auth-service
    networks:
      besu-network:
        ipv4_address: 172.16.239.22
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/healthcheck/"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
  
  auth-service-init:
    extends:
      file: ./auth/docker-compose.yml
      service: auth-service-init
    networks:
      - besu-network


  validator1:
    << : *besu-def
    ports:
      - 21001:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator1,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/TLS/:/tls
      - ./config/nodes/validator1:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    networks:
      besu-network:
        ipv4_address: 172.16.239.11

  validator2:
    << : *besu-def
    ports:
      - 21002:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator2,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/validator2:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    networks:
      besu-network:
        ipv4_address: 172.16.239.12

  validator3:
    << : *besu-def
    ports:
      - 21003:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator3,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/validator3:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    networks:
      besu-network:
        ipv4_address: 172.16.239.13

  validator4:
    << : *besu-def
    ports:
      - 21004:8545/tcp
      - 30303
      - 9545
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=validator4,service.version=${BESU_VERSION:-latest}
    labels:
      - "consensus=besu"
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/validator4:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    networks:
      besu-network:
        ipv4_address: 172.16.239.14
  
  member1besu:
    << : *besu-def
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=member1besu,service.version=${BESU_VERSION:-latest}
      - NODE_ID=6
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/besu/bin/besu \
        --config-file=/config/config.toml \
        --p2p-host=$$(hostname -i) \
        --rpc-http-api=WEB3,ETH,NET,TRACE,DEBUG,ADMIN,TXPOOL,PERM,${BESU_CONS_ALGO:-QBFT} \
        --rpc-http-authentication-jwt-public-key-file=/config/publicRSAKey.pem \
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/member1:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    ports:
      - 20000:8545/tcp
      - 20001:8546/tcp
    networks:
      besu-network:
        ipv4_address: 172.16.239.16

  rpcnode-admin:
    container_name: rpcnode-admin
    restart: "on-failure"
    image: hyperledger/besu:${BESU_VERSION:-latest}
    env_file:
      - ./config/besu/.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        cp "/config/${BESU_CONS_ALGO:-QBFT}genesis.json" /config/genesis.json  
        /opt/besu/bin/besu \
        --config-file=/config/rpcnode-admin-config.toml \
        --p2p-host=$$(hostname -i) \
        --rpc-http-api=WEB3,ETH,NET,TRACE,DEBUG,ADMIN,TXPOOL,PERM,${BESU_CONS_ALGO:-QBFT} \
        --rpc-http-authentication-jwt-public-key-file=/config/publicRSAKey.pem \

    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=rpcnode,service.version=${BESU_VERSION:-latest}
    volumes:
      - ./config/besu/:/config
      - ./config/TLS/:/tls
      - ./config/nodes/rpcnode-admin:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    ports:
      - 127.0.0.1:8545:8545/tcp
      - 127.0.0.1:8546:8546/tcp
      - 30303
      - 9545
    networks:
      besu-network:
        ipv4_address: 172.16.239.15


  rpcnode-user:
    container_name: rpcnode-user
    restart: "on-failure"
    image: hyperledger/besu:${BESU_VERSION:-latest}
    env_file:
      - ./config/besu/.env
    entrypoint:
      - /bin/bash
      - -c
      - |
        cp "/config/${BESU_CONS_ALGO:-QBFT}genesis.json" /config/genesis.json
        /opt/besu/bin/besu \
        --config-file=/config/rpcnode-user-config.toml \
        --p2p-host=$$(hostname -i) \
        --rpc-http-api=WEB3,ETH,NET,${BESU_CONS_ALGO:-QBFT} \
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=service.name=rpcnode,service.version=${BESU_VERSION:-latest}
    volumes:
      - ./config/besu/:/config
      - ./config/nodes/rpcnode-user:/opt/besu/keys
      - ./logs/besu:/tmp/besu
    depends_on:
      - validator1
    ports:
      - 127.0.0.1:8547:8545/tcp
      - 127.0.0.1:8548:8546/tcp
      - 30303
      - 9545
    networks:
      besu-network:
        ipv4_address: 172.16.239.19

